<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Motion Quiz 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screen-start" class="screen active">
    <div class="bg"><img src="images/background.png" alt="background"></div>

    <div class="page">
      <h1>World Cup Motion Quiz <span>2026</span></h1>
      <p class="subtitle">Pick your answer by jumping left or right.</p>

      <div class="start-middle">
        <img src="images/arrow-left.svg" class="start-arrow" alt="left">
        <div class="box camera-box" id="camera-start"></div>
        <div class="gif-box">
          <img src="images/Sidehops-ezgif.com-speed (1).gif" alt="emote">
        </div>
        <img src="images/arrow-right.svg" class="start-arrow" alt="right">
      </div>

      <p class="hint-text">Do this emote to start the quiz!</p>
    </div>
  </div>
